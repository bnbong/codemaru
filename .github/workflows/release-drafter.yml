name: Release Drafter

on:
  push:
    branches: [main]
  # pull_request_target runs in the base-repo context, so the token can write
  # autolabels even on fork PRs (this workflow never checks out PR code).
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write # create/update the draft release
      pull-requests: write # apply autolabels
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
