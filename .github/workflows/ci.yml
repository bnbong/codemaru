name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        # --frozen fails the build if uv.lock is out of sync with pyproject.toml.
        run: uv sync --frozen --dev

      - name: Verify requirements.txt matches uv.lock
        # The Vercel build installs from requirements.txt; keep it pinned to the
        # same versions as the lockfile so prod can't drift from what CI tested.
        # Regenerate in place and fail if anything changed (git diff also avoids
        # the `-o <name>` filename that uv records in the header comment).
        run: |
          uv export --frozen --no-dev --no-hashes --no-emit-project -o requirements.txt
          git diff --exit-code -- requirements.txt \
            || { echo "::error::requirements.txt is stale — regenerate: uv export --frozen --no-dev --no-hashes --no-emit-project -o requirements.txt"; exit 1; }

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy codemaru

      - name: Test (pytest)
        # Live external-API tests are opt-in via the `integration` marker.
        run: uv run pytest -m "not integration" --cov=codemaru --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
