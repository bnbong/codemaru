name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: repro
    attributes:
      label: Reproduction
      description: A request URL or steps, e.g. `/api/card.svg?github=octocat&boj=...`
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - card / rendering
        - adapters (GitHub / solved.ac / LeetCode)
        - scoring
        - web generator / API
        - deployment
        - other
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, fixture vs live mode, anything relevant.
    validations:
      required: false
