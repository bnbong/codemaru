version: 2
updates:
  # Keep SHA-pinned workflow actions current — without this, pinning by commit
  # would silently freeze actions at a version that never gets security fixes.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[CI]"
    groups:
      actions:
        patterns: ["*"]

  # Python deps: uv.lock is the source of truth (pyproject + lockfile). Dependabot
  # doesn't regenerate the derived requirements.txt, so the PR's drift check is
  # skipped for it; the sync-requirements workflow regenerates and commits
  # requirements.txt on main once the bump merges. No manual step needed.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[DEPS]"
    groups:
      python:
        patterns: ["*"]
