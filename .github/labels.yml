# Synced to the repo by .github/workflows/labels.yml (crazy-max/ghaction-github-labeler).
# These back the PR labeler and release-drafter configs.

# Type
- name: "feature"
  color: "0e8a16"
  description: "New functionality"
- name: "enhancement"
  color: "a2eeef"
  description: "Improvement to existing functionality"
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "fix"
  color: "d73a4a"
  description: "Bug fix"
- name: "documentation"
  color: "0075ca"
  description: "Docs only"
- name: "chore"
  color: "fef2c0"
  description: "Refactor / maintenance"
- name: "tests"
  color: "bfd4f2"
  description: "Tests"
- name: "ci"
  color: "ededed"
  description: "CI / workflows"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency changes"
- name: "deployment"
  color: "5319e7"
  description: "Deployment / Vercel"

# Areas
- name: "area: adapters"
  color: "1d76db"
  description: "GitHub / solved.ac / LeetCode adapters"
- name: "area: scoring"
  color: "1d76db"
  description: "core scoring engine"
- name: "area: render"
  color: "1d76db"
  description: "SVG card renderer"
- name: "area: web"
  color: "1d76db"
  description: "generator UI / templates / static"
- name: "area: api"
  color: "1d76db"
  description: "FastAPI app / routes / service"

# Release version bump
- name: "major"
  color: "b60205"
  description: "Breaking change (major bump)"
- name: "minor"
  color: "fbca04"
  description: "Minor version bump"
- name: "patch"
  color: "c2e0c6"
  description: "Patch version bump"
- name: "breaking"
  color: "b60205"
  description: "Breaking change"
