name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["bug", "fix"]
  - title: "🧮 Scoring & Adapters"
    labels: ["area: scoring", "area: adapters"]
  - title: "🎴 Card & Rendering"
    labels: ["area: render"]
  - title: "🌐 Web & API"
    labels: ["area: web", "area: api"]
  - title: "📝 Documentation"
    labels: ["documentation"]
  - title: "🧰 Maintenance"
    labels: ["chore", "ci", "dependencies", "deployment", "tests"]

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "bug", "fix", "chore", "documentation", "dependencies"]
  default: patch

# Auto-apply labels from the PR title. Two prefix styles are supported:
#   - Conventional Commits — "feat:", "fix:", "docs:", ...
#   - Bracket tags — "[FEAT]", "[FIX] ...", and comma-combos like "[FIX, DOCS]"
#     (case-insensitive; each tag in the bracket applies its own label).
# The bracket regex matches a tag as a whole word (\b) anywhere inside the
# leading [...] block, so "[FIX, DOCS]" triggers both "bug" and "documentation".
autolabeler:
  - label: "feature"
    title:
      - "/^feat(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(feat|feature)\\b[^\\]]*\\]/i"
  - label: "bug"
    title:
      - "/^fix(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(fix|bugfix|hotfix)\\b[^\\]]*\\]/i"
  - label: "documentation"
    title:
      - "/^docs(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(docs?|documentation)\\b[^\\]]*\\]/i"
  - label: "chore"
    title:
      - "/^(chore|refactor|style|perf)(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(chore|refactor|style|perf)\\b[^\\]]*\\]/i"
  - label: "ci"
    title:
      - "/^ci(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(ci|build)\\b[^\\]]*\\]/i"
  - label: "tests"
    title:
      - "/^test(\\(.*\\))?:/i"
      - "/^\\[[^\\]]*\\b(tests?)\\b[^\\]]*\\]/i"
  - label: "dependencies"
    title:
      - "/^\\[[^\\]]*\\b(deps?|dependencies)\\b[^\\]]*\\]/i"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/bnbong/codemaru/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
