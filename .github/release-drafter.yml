name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["bug", "fix"]
  - title: "🧮 Scoring & Adapters"
    labels: ["area: scoring", "area: adapters"]
  - title: "🎴 Card & Rendering"
    labels: ["area: render"]
  - title: "🌐 Web & API"
    labels: ["area: web", "area: api"]
  - title: "📝 Documentation"
    labels: ["documentation"]
  - title: "🧰 Maintenance"
    labels: ["chore", "ci", "dependencies", "deployment", "tests"]

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "bug", "fix", "chore", "documentation", "dependencies"]
  default: patch

# Auto-apply labels to PRs from Conventional-Commit-style titles.
autolabeler:
  - label: "feature"
    title: ["/^feat(\\(.*\\))?:/i"]
  - label: "bug"
    title: ["/^fix(\\(.*\\))?:/i"]
  - label: "documentation"
    title: ["/^docs(\\(.*\\))?:/i"]
  - label: "chore"
    title: ["/^(chore|refactor|style|perf)(\\(.*\\))?:/i"]
  - label: "ci"
    title: ["/^ci(\\(.*\\))?:/i"]
  - label: "tests"
    title: ["/^test(\\(.*\\))?:/i"]

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/bnbong/codemaru/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
